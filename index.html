<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#06060f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nur Tasbih" />

  <!-- SEO & Social -->
  <title>Nur Tasbih — Dijital Tesbih & Namaz Vakitleri</title>
  <meta name="description" content="Dijital tesbih, namaz vakitleri, kıble yönü ve günlük ayet. Türkçe İslami uygulama." />
  <meta name="keywords" content="tesbih, namaz vakitleri, kıble, zikir, islamiuygulama, dijital tesbih" />

  <!-- Open Graph -->
  <meta property="og:title" content="Nur Tasbih" />
  <meta property="og:description" content="Dijital tesbih, namaz vakitleri ve kıble yönü" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icon-512.png" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service Worker kaydet
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered:', reg.scope);
          // SW'den gelen bildirim mesajlarını dinle
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data?.type === 'SHOW_NOTIFICATION') {
              reg.showNotification(event.data.title, {
                body: event.data.body,
                icon: '/icon-192.png',
                tag: event.data.tag,
              });
            }
          });
        }).catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
